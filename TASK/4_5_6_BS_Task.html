<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DK Cafe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

 
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>


<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">DK Cafe</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link">Home</a></li>
        <li class="nav-item"><a class="nav-link " >Menu</a></li>

        <li class="nav-item"><a class="nav-link">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>


<div class="container mt-4">

  
  <div class="alert alert-warning alert-dismissible fade show" role="alert">
    Welcome to DK Cafe.
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>


  <button class="btn btn-outline-success">View Menu</button>
  <button class="btn btn-danger">Special Offer</button>
  <button class="btn btn-primary">Order Now</button>
</div>


<div class="container ">
  <br>
  <div class="row">

    <div class="col-md-4">
      <div class="card">
        <h5 class="card-title">Coffee</h5>
        <img src="hot coldcoffee.jpg" class="card-img-top">
        <div class="card-body">
          
          <p class="card-text">Cold and Hot coffee available in our cafe .</p>
          <a href="#" class="btn btn-primary">Order Now</a>
        </div>
      </div>
    </div>

  
    <div class="col-md-4">
      <div class="card">
        <img src="pizza.jpg" alt="image have" class="card-img-top">
        <div class="card-body">
          <h5 class="card-title">Pizza</h5>
          <p class="card-text">Delicious cheesy pizza with fresh toppings.</p>
          <a href="#" class="btn btn-success">Order Now</a>
        </div>
      </div>
    </div>

   
    <div class="col-md-4">
      <div class="card">
        <img src="burger.webp" class="card-img-top">
        <div class="card-body">
          <h5 class="card-title">Burger</h5>
          <p class="card-text">Juicy burgers with crispy fries combo.</p>
          <a href="#" class="btn btn-danger">combo Order now</a>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="container my-5">
  <h3>Contact DK Cafe</h3>

  <form>
    <div class="my-3">
      <label class="form-label">Name</label>
      <input type="text" class="form-control" placeholder="Enter your name">
    </div>

    <div class="my-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" placeholder="Enter your email">
    </div>

    <div class="my-3">
      <label class="form-label">Message</label>
      <textarea class="form-control" rows="4" placeholder="Enter your message"></textarea>
    </div>

    <button type="submit" class="btn btn-primary">Send </button>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
